name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install package
        run: |
          pip install -e ".[dev]"
          pip install imageio-ffmpeg

      - name: Lint
        run: ruff check src/speechsum/ tests/

      - name: Type check
        run: mypy src/speechsum/ --ignore-missing-imports

      - name: Test
        run: pytest tests/ -v --tb=short --cov=src/speechsum

      - name: Test CLI help
        run: |
          speechsum --help
          speechsum transcribe --help
          speechsum summarize --help
          speechsum config show
